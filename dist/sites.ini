; 送信サジェスト - 送信ルール設定ファイル（UTF-8）
;
; ■ [プロセス名.exe] セクション: アプリ単位の既定ルール
;     send=enter   -> 右クリック長押しで Enter を送信
;     send=manual  -> 送信せず「送信ボタンを押してください」と案内
;   プロセス名はタスクマネージャーの「詳細」タブで確認できます。
;
; ■ [sites] セクション: ウィンドウタイトルのキーワードで上書き
;     キーワード=enter または キーワード=manual
;   ブラウザのタブ名（ウィンドウの見出し）にキーワードが含まれていると、
;   アプリ既定より優先してそのルールが使われます。上の行ほど優先。
;   ※タブ名にサイト名が出ないページでは判定できず、アプリ既定に戻ります。
;   （送信ボタン式サイトの入力欄はEnterで送信されない作りが多いため、
;    判定できなかった場合も誤送信にはなりにくい設計です）
;
; ■ [general] セクション: 全体設定
;     longpress=0.35  -> 右クリック長押し / サイドボタン長押しの閾値（秒）
;
; ■ [clipboard] セクション: グローバル履歴監視
;     watch=on|off     -> 監視の既定ON/OFF（トレイからも一時停止可）
;     max=30           -> 履歴の最大件数（メモリのみ・非永続）
;     autoclear=45     -> パスワードマネージャ等の自動クリア検知（秒）
;     exclude=a.exe,b.exe -> 追加で除外するプロセス名（カンマ区切り）

[general]
;longpress=0.35 ; ゲーミングマウス等で誤反応する場合は大きく

[clipboard]
;watch=on
;max=30
;autoclear=45
;exclude=example.exe

[chrome.exe]
send=enter

[msedge.exe]
send=enter

[firefox.exe]
send=enter

[brave.exe]
send=enter

[iron.exe]
send=enter

[slimjet.exe]
send=enter

[opera.exe]
send=enter

[ChatGPT.exe]
send=enter

[claude.exe]
send=enter

[Chatwork.exe]
send=enter

[sites]
; --- 送信ボタン式サイト（自動送信せず案内を出す） ---
ココナラ=manual
coconala=manual
; 以下は必要に応じて ; を外して有効化してください（実際の挙動を確認のうえで）
;クラウドワークス=manual
;crowdworks=manual
;ランサーズ=manual
;lancers=manual
